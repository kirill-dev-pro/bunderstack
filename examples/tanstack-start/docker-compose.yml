name: bunderstack-tanstack

services:
  app:
    build:
      context: ../..
      dockerfile: examples/tanstack-start/Dockerfile
    environment:
      DATABASE_URL: 'file:/data/db/data.db'
      AUTH_SECRET: '${AUTH_SECRET:?AUTH_SECRET env var is required}'
      APP_URL: ${APP_URL:?APP_URL env var is required}
    volumes:
      - db_data:/data/db
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      # SSR routes can be slow; probe a static asset instead of /
      test:
        [
          'CMD-SHELL',
          'wget -q --spider "http://127.0.0.1:3000/assets/$$(basename $$(ls .output/public/assets/app-*.css | head -1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  db_data:
  uploads:
