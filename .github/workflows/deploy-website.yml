name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      # Landing snippets typecheck against the real package sources — a
      # package change can change (or break) the rendered hover types.
      - 'packages/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Root install first: gen-code-snippets.ts resolves bunderstack packages
      # from ../packages/*/src, whose imports (drizzle-orm, better-auth, hono,
      # @tanstack/db, …) live in the root workspace node_modules. Without it,
      # twoslash silently renders every hover as `any`.
      - name: Install workspace deps
        run: bun install

      - name: Install & build
        working-directory: website
        env:
          GITHUB_PAGES: 'true'
        run: |
          bun install
          bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
